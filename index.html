<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Counter - プレミアム小役カウンター</title>
    <!-- Google Fonts: Outfit (数字用) & Plus Jakarta Sans (日本語用) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 総ゲーム数表示パネル -->
        <section class="game-panel-card" style="margin-top: 4px;">
            <div class="panel-header">
                <div class="logo-inline">
                    <span class="logo-icon">🎰</span>
                    <span class="logo-text">X Counter</span>
                    <button id="theme-toggle-btn" class="theme-toggle-btn" onclick="toggleTheme()" title="配色テーマを切り替え">☀️</button>
                    <button id="vibrate-toggle-btn" class="vibrate-toggle-btn" onclick="toggleVibrateSetting()" title="バイブレーション設定を切り替え">📳</button>
                </div>
                <div class="personal-games-wrapper">
                    <h2>個人ゲーム数</h2>
                    <div class="game-screen">
                        <span id="total-games" class="digital-number">0</span>
                        <span class="unit">G</span>
                    </div>
                </div>
            </div>

            <!-- 計算要素の入力エリア（JavaScriptで動的生成） -->
            <div id="calculation-row-container" class="calculation-row"></div>
            <!-- 小役・ゲーム項目の追加アクションボタン -->
            <div class="panel-actions">
                <button class="add-counter-btn" onclick="addCounter()">
                    <span class="btn-icon">＋</span> 小役追加
                </button>
                <button class="add-counter-btn combined" onclick="addCombinedCounter()">
                    <span class="btn-icon">➕</span> 合算小役
                </button>
                <button class="add-counter-btn rate-counter-add" onclick="addRateCounter()">
                    <span class="btn-icon">🎯</span> 当選率
                </button>
                <button class="add-counter-btn game-item-add" onclick="addGameItem()">
                    <span class="btn-icon">⏱️</span> ゲーム数
                </button>
                <button class="add-counter-btn mode-add" onclick="addMode()">
                    <span class="btn-icon">🔄</span> 状態追加
                </button>
            </div>
        </section>

        <!-- モード選択タブ（JavaScriptで動的生成） -->
        <div class="mode-tabs-wrapper" style="position: relative;">
            <div id="mode-tabs-container" class="mode-tabs"></div>
        </div>

        <!-- 小役カウンターエリア -->
        <section class="counters-section">
            <div class="counters-section-header">
                <span class="counters-section-title">小役カウンター</span>
                <div class="counters-section-header-actions">
                    <button id="count-mode-plus-btn" class="quick-action-btn add active" onclick="setCountMode('plus')" title="加算モード（＋）">＋</button>
                    <button id="count-mode-minus-btn" class="quick-action-btn sub" onclick="setCountMode('minus')" title="減算モード（－）">－</button>
                    <button id="count-clear-btn" class="quick-action-btn clear" onclick="clearAllCountersCount()" title="小役カウントをクリア（ゲーム数除く）">🧹</button>
                    <button id="edit-mode-toggle-btn" class="edit-mode-toggle-btn" onclick="toggleEditMode()" title="ボタン編集モードを切り替え">
                        <span class="edit-btn-icon">✏️</span>
                        <span class="edit-btn-text">ボタン編集</span>
                    </button>
                </div>
            </div>
            <div id="counters-grid" class="counters-grid">
                <!-- JavaScriptでここに小役カードが動的に挿入されます -->
            </div>
        </section>

        <!-- 設定推測セクション -->
        <section class="estimation-card accordion-card is-open" id="estimation-accordion">
            <div class="estimation-header accordion-header" onclick="toggleAccordion('estimation-accordion')">
                <div class="accordion-title-area">
                    <span class="accordion-arrow">▼</span>
                    <h2>📊 設定推測</h2>
                </div>
                <div class="model-select-wrapper" onclick="event.stopPropagation()">
                    <select id="model-select" onchange="handleModelChange(this.value)">
                        <!-- JSで動的に追加されます -->
                    </select>
                    <button id="save-model-btn" class="preset-action-btn save" onclick="saveCurrentModelAsPreset()" title="現在の構成を新規機種として保存">
                        💾 保存
                    </button>
                    <button id="delete-model-btn" class="preset-action-btn delete" onclick="deleteCurrentModelPreset()" title="この機種設定を削除" disabled>
                        🗑️ 削除
                    </button>
                </div>
            </div>

            <div class="accordion-content-wrapper">
                <div class="accordion-content">
                    <!-- 推測結果のバー表示 -->
                    <div class="estimation-results">
                        <h3 class="estimation-sub-title">総合設定推測</h3>
                        <div class="result-row" id="result-s1">
                            <span class="setting-label">設定1</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="bar-s1" style="width: 16.7%"></div>
                            </div>
                            <span class="percent-label" id="percent-s1">16.7%</span>
                        </div>
                        <div class="result-row" id="result-s2">
                            <span class="setting-label">設定2</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="bar-s2" style="width: 16.7%"></div>
                            </div>
                            <span class="percent-label" id="percent-s2">16.7%</span>
                        </div>
                        <div class="result-row" id="result-s3">
                            <span class="setting-label">設定3</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="bar-s3" style="width: 16.7%"></div>
                            </div>
                            <span class="percent-label" id="percent-s3">16.7%</span>
                        </div>
                        <div class="result-row" id="result-s4">
                            <span class="setting-label">設定4</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="bar-s4" style="width: 16.7%"></div>
                            </div>
                            <span class="percent-label" id="percent-s4">16.7%</span>
                        </div>
                        <div class="result-row" id="result-s5">
                            <span class="setting-label">設定5</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="bar-s5" style="width: 16.7%"></div>
                            </div>
                            <span class="percent-label" id="percent-s5">16.7%</span>
                        </div>
                        <div class="result-row" id="result-s6">
                            <span class="setting-label">設定6</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="bar-s6" style="width: 16.7%"></div>
                            </div>
                            <span class="percent-label" id="percent-s6">16.7%</span>
                        </div>
                    </div>

                    <!-- 小役別設定推測結果 -->
                    <div id="individual-estimations-container" class="individual-estimations-container"></div>

                    <!-- 設定差データの詳細・編集用アコーディオン -->
                    <details class="model-details">
                        <summary>設定差（出現率分母）の確認・編集</summary>
                        <div class="model-table-container">
                            <div class="table-header-controls">
                                <p class="table-info">空欄の小役は設定推測から除外されます</p>
                                <button id="clear-model-table-btn" class="table-clear-btn" onclick="clearModelTableDenominators()" title="設定差テーブルの数値をすべて消去します">
                                    🧹 設定差をクリア
                                </button>
                            </div>
                            <!-- 使用設定段階の選択トグル -->
                            <div id="active-settings-control" class="active-settings-control"></div>

                            <table class="model-table">
                                <thead id="model-table-header">
                                    <!-- JS側で動的にヘッダーを構築します -->
                                </thead>
                                <tbody id="model-table-body">
                                    <!-- JS側で動的に小役ごとの設定入力行を構築します -->
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>
            </div>
        </section>

        <!-- 機種別メモ帳 ＆ 画像・スクショ保管庫セクション（独立パネル） -->
        <section class="estimation-card accordion-card" id="gallery-accordion" style="margin-top: 6px;">
            <div class="estimation-header accordion-header" onclick="toggleAccordion('gallery-accordion')">
                <div class="accordion-title-area">
                    <span class="accordion-arrow">▼</span>
                    <h2>📝 機種別メモ帳 ＆ 画像保管</h2>
                </div>
            </div>
            <div class="accordion-content-wrapper">
                <div class="accordion-content">
                    <div class="gallery-container">
                        <!-- メモ帳セクション -->
                        <div class="model-memo-section">
                            <div class="memo-header">
                                <h4>📝 機種テキストメモ帳</h4>
                                <span class="memo-status" id="memo-status"></span>
                            </div>
                            <textarea id="model-memo-textarea" oninput="saveModelMemo()" placeholder="例：設定6のチェリー重複ボーナス確率は 1/900。ぶどう確率は 1/5.7〜1/6.0。天井狙いは500G〜など自由に入力してください。自動保存されます。"></textarea>
                        </div>

                        <!-- 画像保管セクション -->
                        <div class="model-image-section">
                            <div class="image-section-header">
                                <h4>📸 画像・スクリーンショット保管庫</h4>
                                <button class="add-image-btn" onclick="triggerFileSelect()">画像追加</button>
                            </div>
                            <input type="file" id="image-file-input" accept="image/*" multiple onchange="handleImageUpload(event)" style="display: none;">
                            <!-- 画像一覧グリッド -->
                            <div class="image-gallery-grid" id="image-gallery-grid">
                                <!-- JSで動的に画像カードが生成されます -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 実践履歴セクション（独立パネル） -->
        <section class="estimation-card accordion-card" id="history-accordion" style="margin-top: 6px;">
            <div class="estimation-header accordion-header" onclick="toggleAccordion('history-accordion')">
                <div class="accordion-title-area">
                    <span class="accordion-arrow">▼</span>
                    <h2>📋 実践履歴</h2>
                </div>
            </div>
            <div class="accordion-content-wrapper">
                <div class="accordion-content">
                    <div class="history-container">
                        <!-- 履歴新規登録フォーム -->
                        <div id="history-form-area" class="history-form-area">
                            <h4>📋 実践履歴の新規登録</h4>
                            <div class="history-form-row">
                                <div class="form-group">
                                    <label for="history-date">日付</label>
                                    <input type="date" id="history-date">
                                </div>
                                <div class="form-group">
                                    <div class="shop-label-container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                                        <label for="history-shop">実践店舗名</label>
                                        <span class="shop-manage-link" onclick="event.stopPropagation(); toggleShopManager()" style="font-size: 8px; font-weight: 800; color: #3F51B5; cursor: pointer; text-decoration: underline;" title="登録済み店舗の編集や削除">⚙️店舗の整理</span>
                                    </div>
                                    <input type="text" id="history-shop" list="shop-datalist" placeholder="例：新宿店">
                                    <datalist id="shop-datalist"></datalist>
                                </div>
                                <div class="form-group">
                                    <label for="history-diff">差枚数 (枚)</label>
                                    <input type="number" id="history-diff" placeholder="例：+1500枚">
                                </div>
                                <button class="add-history-btn" onclick="saveHistoryLog()">履歴を登録する</button>
                            </div>

                            <!-- 店舗リスト編集・削除用インライン管理エリア -->
                            <div id="shop-manager-area" class="shop-manager-area" style="display: none;">
                                <h5>⚙️ 登録済み店舗名の編集・削除</h5>
                                <div id="shop-manager-list" class="shop-manager-list">
                                    <!-- JSで動的に「店舗名 ✏️ ❌」が並びます -->
                                </div>
                            </div>
                        </div>

                        <!-- 履歴一覧テーブル -->
                        <div class="history-table-wrapper">
                            <table class="history-table">
                                <thead>
                                    <tr>
                                        <th>日付</th>
                                        <th>店舗名</th>
                                        <th>機種名</th>
                                        <th>総G数</th>
                                        <th>差枚数</th>
                                        <th>推測結果</th>
                                        <th>呼出</th>
                                        <th>削除</th>
                                    </tr>
                                </thead>
                                <tbody id="history-table-body">
                                    <!-- JSで動的に履歴行が追加されます -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- グローバル操作エリア -->
        <footer>
            <button class="backup-btn" onclick="exportBackup()" title="現在の全データをJSONファイルとしてエクスポートします">
                <span>💾 バックアップ</span>
            </button>
            <button class="restore-btn" onclick="triggerRestoreSelect()" title="保存したJSONファイルを読み込んでデータを復元します">
                <span>📤 復元</span>
            </button>
            <input type="file" id="backup-file-input" accept=".json" style="display: none;" onchange="importBackup(event)">
            <button class="backup-model-btn" onclick="exportCurrentModel()" title="現在選択されている機種設定のみをJSONファイルとしてエクスポートします">
                <span>💾 機種保存</span>
            </button>
            <button class="load-model-btn" id="load-model-file-btn" onclick="triggerModelFileSelect()" title="機種個別設定ファイル（XC...json）を読み込んで機種リストに追加します">
                <span>📥 機種読込</span>
            </button>
            <input type="file" id="model-file-input" accept=".json" style="display: none;" onchange="importModelFile(event)">
            <button class="reset-btn" onclick="resetAll()" title="すべてのデータをリセットします">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                </svg>
                <span>リセット</span>
            </button>
        </footer>
    </div>

    <!-- 画像拡大表示用モーダル（ライトボックス） -->
    <div id="lightbox-modal" class="lightbox-modal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script src="app.js"></script>
</body>
</html>
